[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm && pnpm install"]

[phases.build]
cmds = [
  "pnpm exec vite build --outDir dist/public",
  "pnpm exec esbuild server/_core/index.ts --bundle --platform=node --packages=external --format=esm --outfile=dist/index.mjs"
]

[start]
cmd = "NODE_ENV=production PORT=${PORT:-3000} node dist/index.mjs"
